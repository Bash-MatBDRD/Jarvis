<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div id="hud">

  <!-- ── TOP BAR ── -->
  <header id="topbar">
    <div class="tb-left">
      <div class="jarvis-title">J·A·R·V·I·S</div>
      <div class="tb-sep"></div>
      <div class="tb-sub">MARK VII · SYSTÈME ACTIF</div>
    </div>
    <div class="tb-center">
      <div class="stat-block"><span class="sl">CPU</span><span class="sv" id="s-cpu">--%</span></div>
      <div class="stat-block"><span class="sl">MEM</span><span class="sv" id="s-ram">--</span></div>
      <div class="stat-block"><span class="sl">DSK</span><span class="sv" id="s-disk">--%</span></div>
      <div class="stat-block"><span class="sl">BAT</span><span class="sv" id="s-bat">--%</span></div>
    </div>
    <div class="tb-right">
      <div id="mode-badge" class="badge">MODE BASIQUE</div>
      <div class="badge badge-ok">EN LIGNE</div>
      <div id="s-time" class="tb-time">--:--</div>
    </div>
  </header>

  <!-- ── MAIN ── -->
  <main id="main">

    <!-- LEFT: Reactor + Controls -->
    <section id="left-panel">

      <!-- Corner brackets -->
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>

      <!-- Arc reactor -->
      <div id="reactor-wrap">
        <svg id="reactor-svg" viewBox="0 0 320 320">
          <!-- Outer ring -->
          <circle class="rr r-outer" cx="160" cy="160" r="148"/>
          <!-- Tick marks outer -->
          <g id="ticks"></g>
          <!-- Spinning rings -->
          <circle class="rr r1" cx="160" cy="160" r="128"/>
          <circle class="rr r2" cx="160" cy="160" r="108"/>
          <circle class="rr r3" cx="160" cy="160" r="88"/>
          <!-- Hexagon spokes -->
          <g id="spokes" opacity=".35">
            <line x1="160" y1="160" x2="160" y2="30" />
            <line x1="160" y1="160" x2="274" y2="97" />
            <line x1="160" y1="160" x2="274" y2="223"/>
            <line x1="160" y1="160" x2="160" y2="290"/>
            <line x1="160" y1="160" x2="46"  y2="223"/>
            <line x1="160" y1="160" x2="46"  y2="97" />
          </g>
          <!-- Arc actif -->
          <circle class="arc-active" cx="160" cy="160" r="148"/>
          <!-- Glow center -->
          <circle id="core-glow" cx="160" cy="160" r="44" opacity=".15"/>
          <circle id="core-inner" cx="160" cy="160" r="28"/>
        </svg>

        <!-- Texte au centre du réacteur -->
        <div id="reactor-text">
          <div id="reactor-label">J.A.R.V.I.S</div>
          <div id="state-label">EN ATTENTE</div>
          <canvas id="wave-canvas" width="110" height="28"></canvas>
        </div>
      </div>

      <!-- Mic button -->
      <button id="mic-btn" title="Cliquer ou claper des mains">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8"  y1="23" x2="16" y2="23"/>
        </svg>
        <span id="mic-label">PARLER</span>
      </button>

      {% if not has_api_key %}
      <div id="warn-banner">
        ⚠ Clé OpenAI manquante dans <code>config.py</code> — mode basique actif.
        <a href="https://platform.openai.com/api-keys" target="_blank">Obtenir →</a>
      </div>
      {% endif %}

    </section>

    <!-- RIGHT: Conversation -->
    <section id="right-panel">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>

      <div id="conv-header">
        <span class="conv-title">JOURNAL DE SESSION</span>
        <button id="clear-btn">⌫ EFFACER</button>
      </div>

      <div id="conv-log"></div>

      <div id="input-row">
        <input id="text-input" type="text"
               placeholder="Entrez une commande…"
               autocomplete="off" spellcheck="false">
        <button id="send-btn">↵</button>
      </div>
    </section>

  </main>
</div>

<div id="toast"></div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="/static/js/jarvis.js"></script>
</body>
</html>
